# ===============================
# APPLICATION CONFIG
# ===============================

spring.application.name=edtech-backend

server.port=8080


# ===============================
# POSTGRESQL DATABASE CONFIG
# ===============================

spring.datasource.url=jdbc:postgresql://localhost:5432/edtech_db
spring.datasource.username=postgres
spring.datasource.password=root

spring.datasource.driver-class-name=org.postgresql.Driver


# ===============================
# JPA / HIBERNATE CONFIG
# ===============================

spring.jpa.hibernate.ddl-auto=update

spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect


# ===============================
# LOGGING
# ===============================

logging.level.org.springframework.web=INFO
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=TRACE


# ===============================
# FILE UPLOAD CONFIG (Future Use)
# ===============================

spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB


# ===============================
# JACKSON DATE FORMAT
# ===============================

# spring.jackson.serialization.WRITE_DATES_AS_TIMESTAMPS=false


# ===============================
# DEVTOOLS (OPTIONAL)
# ===============================

spring.devtools.restart.enabled=true
spring.devtools.livereload.enabled=true


# ===============================
# PAYMENTS CONFIGURATION
# ===============================

razorpay.key=YOUR_RAZORPAY_KEY
razorpay.secret=YOUR_RAZORPAY_SECRET


# ===============================
# OLLAMA AI CONFIG
# ===============================

spring.ai.ollama.base-url=http://localhost:11434
spring.ai.ollama.chat.options.model=llama3:latest
spring.ai.ollama.chat.options.temperature=0.7
spring.ai.ollama.embedding.options.model=nomic-embed-text:latest
spring.ai.ollama.embedding.enabled=true


# spring.ai.openai.api-key=AIzaSyCaK5b6Go3caA4TIJqgxSjO5vj37ARFSz4
# spring.ai.openai.base-url=https://generativelanguage.googleapis.com/v1beta/openai
# spring.ai.openai.chat.options.model=gemini-2.0-flash

# ===============================
# AI LOGGING
# ===============================

logging.level.org.springframework.ai=DEBUG

logging.level.com.edtech.ai=DEBUG


# ===============================
# WEBFLUX CONFIG (AI Streaming)
# ===============================

spring.codec.max-in-memory-size=10MB


